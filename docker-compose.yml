services:
  db:
    image: postgres:16-alpine
    container_name: rms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rms
      POSTGRES_PASSWORD: rms
      POSTGRES_DB: rms_dev
    ports:
      # 5433 on the host: avoids clashing with other local Postgres instances (e.g. inside WSL)
      - "5433:5432"
    volumes:
      - rms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rms -d rms_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: rms-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI: http://localhost:8025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  rms-pgdata:
